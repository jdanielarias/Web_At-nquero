<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Panel — El Atánquero Explora</title>
  </head>
  <body>
    <!-- El panel de administracion: Decap CMS editando el repositorio de
         GitHub directamente. Solo entra quien tenga permiso de escritura en
         el repo — hoy, unicamente el dueño. Se edita una experiencia (o una
         mochila, o un video) con formularios y, al darle Publicar, el CMS
         hace el commit — Vercel despliega solo.

         La configuracion va aqui en JavaScript (y no en el config.yml de
         siempre) por una razon: asi base_url puede ser location.origin y el
         login funciona en cualquier dominio — el .vercel.app de ahora o un
         dominio propio despues — sin tocar nada. -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          locale: 'es',
          backend: {
            name: 'github',
            repo: 'jdanielarias/Web_At-nquero',
            branch: 'main',
            // El intercambio de llaves con GitHub lo hacen las funciones
            // /api/auth y /api/callback de este mismo dominio.
            base_url: window.location.origin,
            auth_endpoint: 'api/auth',
            commit_messages: {
              create: 'Se agregó {{collection}}: {{slug}} (desde el panel)',
              update: 'Se actualizó {{collection}}: {{slug}} (desde el panel)',
              delete: 'Se borró {{collection}}: {{slug}} (desde el panel)',
              uploadMedia: 'Se subió la foto {{path}} (desde el panel)',
              deleteMedia: 'Se borró la foto {{path}} (desde el panel)',
            },
          },
          // Para probar el panel en el computador sin tocar GitHub:
          // npx decap-server en una terminal y npm run dev en otra.
          local_backend: true,
          // Los nombres de carpeta salen del titulo, sin tildes ni espacios.
          slug: { encoding: 'ascii', clean_accents: true, sanitize_replacement: '-' },
          media_folder: 'fotos_recorrido/web',
          public_folder: 'fotos_recorrido/web',
          collections: [
            {
              name: 'experiencias',
              label: 'Experiencias',
              label_singular: 'Experiencia',
              description:
                'Eventos y salidas en las que estuvo El Atánquero: fotos en carrusel y un cuento corto. La más reciente sale primero.',
              folder: 'experiencias',
              create: true,
              format: 'json',
              extension: 'json',
              path: '{{slug}}/experiencia',
              media_folder: 'fotos',
              public_folder: 'fotos',
              identifier_field: 'titulo',
              summary: '{{titulo}} — {{fecha}}',
              fields: [
                { label: 'Título', name: 'titulo', widget: 'string' },
                {
                  label: 'Fecha',
                  name: 'fecha',
                  widget: 'string',
                  hint: 'Año-mes o año-mes-día: 2026-06 o 2026-06-14. Solo ordena: lo más reciente sale primero.',
                },
                { label: 'Lugar', name: 'lugar', widget: 'string', required: false },
                { label: 'Descripción', name: 'descripcion', widget: 'text' },
                {
                  label: 'Fotos del carrusel',
                  name: 'fotos',
                  widget: 'list',
                  required: false,
                  hint: 'El orden de esta lista es el orden del carrusel.',
                  field: { label: 'Foto', name: 'foto', widget: 'image' },
                },
              ],
            },
            {
              name: 'mochilas',
              label: 'Mochilas',
              label_singular: 'Mochila',
              description: 'El catálogo de mochilas en venta.',
              folder: 'mochilas',
              create: true,
              format: 'json',
              extension: 'json',
              path: '{{slug}}/mochila',
              media_folder: '',
              public_folder: '',
              identifier_field: 'nombre',
              summary: '{{nombre}} ({{estado}})',
              fields: [
                { label: 'Nombre', name: 'nombre', widget: 'string' },
                { label: 'Dibujo', name: 'dibujo', widget: 'string', required: false },
                {
                  label: 'Estado',
                  name: 'estado',
                  widget: 'select',
                  options: ['disponible', 'vendida'],
                  default: 'disponible',
                },
                {
                  label: 'Precio (COP)',
                  name: 'precio',
                  widget: 'number',
                  value_type: 'int',
                  required: false,
                  hint: 'Déjalo vacío para que diga "pregunta por WhatsApp".',
                },
                { label: 'Historia', name: 'historia', widget: 'text', required: false },
                {
                  label: 'Ficha',
                  name: 'ficha',
                  widget: 'list',
                  required: false,
                  hint: 'Datos cortos: la fibra, el tinte, dónde se tejió.',
                  field: { label: 'Dato', name: 'dato', widget: 'string' },
                },
                {
                  label: 'Foto de portada',
                  name: 'portada',
                  widget: 'image',
                  required: false,
                  hint: 'Sale mejor vertical: la tarjeta del catálogo es 4:5.',
                },
                {
                  label: 'Más fotos',
                  name: 'fotos',
                  widget: 'list',
                  required: false,
                  field: { label: 'Foto', name: 'foto', widget: 'image' },
                },
              ],
            },
            {
              name: 'hilo',
              label: 'El hilo (videos y fotos)',
              label_singular: 'Pieza',
              description: 'Los videos de YouTube y las fotos de la sección "El hilo" de la página principal.',
              folder: 'hilo',
              create: true,
              format: 'json',
              extension: 'json',
              path: '{{slug}}/pieza',
              media_folder: '',
              public_folder: '',
              identifier_field: 'titulo',
              summary: '{{titulo}} — {{fecha}}',
              fields: [
                { label: 'Título', name: 'titulo', widget: 'string' },
                { label: 'Nota', name: 'nota', widget: 'text', required: false },
                {
                  label: 'Fecha',
                  name: 'fecha',
                  widget: 'string',
                  required: false,
                  hint: 'Año-mes: 2026-06. Solo ordena: lo más reciente sale primero.',
                },
                {
                  label: 'Enlace de YouTube',
                  name: 'youtube',
                  widget: 'string',
                  required: false,
                  hint: 'Pega el enlace tal como lo copias de YouTube. Si la pieza es una foto, déjalo vacío.',
                },
                {
                  label: 'Foto',
                  name: 'foto',
                  widget: 'image',
                  required: false,
                  hint: 'Solo si la pieza es una foto y no un video.',
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
